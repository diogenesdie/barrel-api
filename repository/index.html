<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
    <style>
        .flex {
            display: flex;
            gap: 10px;
            background-color: lightgray;
            padding: 10px;
            align-items: center;
        }
        .flex > div {
            background-color: steelblue;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .block {
            background-color: red;
            width: 100px;
        }
    </style>
<body>
    <div class="flex">
        <div class="block height-100"></div>
        <div class="block height-150"></div>
        <div class="block height-100"></div>
        <div class="block height-150"></div>
    </div>
</body>
</html>
